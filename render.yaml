# ──────────────────────────────────────────────────────────
# Render Blueprint — Debiasiq AI Frontend (Streamlit)
# Branch: Frontend
# ──────────────────────────────────────────────────────────
services:
  - type: web
    name: debiasiq-frontend
    runtime: docker
    repo: https://github.com/Krispymarty/bias-detection-system.git
    branch: Frontend
    plan: free
    dockerfilePath: ./Dockerfile.streamlit
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: STREAMLIT_SERVER_PORT
        value: 10000
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
